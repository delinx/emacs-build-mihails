name: build

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  prepare_env:
    name: Prepare build version
    runs-on: ubuntu-latest
    env:
      EMACS_REPO: https://github.com/emacs-mirror/emacs.git
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Get build version
        id: vars
        run: |
          mkdir -p ./git/emacs
          cd ./git/emacs/
          git clone --depth 1 --branch emacs-30.2 $EMACS_REPO .
          ts=`date +'%Y%m%d'`
          commit=`git rev-parse --short=8 HEAD`
          major_ver=`cat configure.ac | grep -Po 'AC_INIT\(.*\[\K\d+'`
          version=`echo ${major_ver}.${{ github.run_number }}.${ts}.${commit}`

          echo "commit=${commit}" >> $GITHUB_ENV
          echo "branch=emacs-30.2" >> $GITHUB_ENV
          echo "version=${version}" >> $GITHUB_ENV
          echo "pkg_version=${major_ver}.${{ github.run_number }}.0.0" >> $GITHUB_ENV
    outputs:
      repo: ${{ env.EMACS_REPO }}
      version: ${{ env.version }}
      pkg_version: ${{ env.pkg_version }}
      commit: ${{ env.commit }}
      branch: ${{ env.branch }}

  build_windows:
    needs: prepare_env
    name: Build Emacs
    runs-on: windows-2025
    timeout-minutes: 45
    env:
      EMACS_REPO: ${{ needs.prepare_env.outputs.repo }}
      EMACS_COMMIT: ${{ needs.prepare_env.outputs.commit }}
      EMACS_BRANCH: ${{ needs.prepare_env.outputs.branch }}
      EMACS_PKG_VERSION: ${{ needs.prepare_env.outputs.pkg_version }}
      EMACS_CERT_SECRET: ${{ secrets.EMACS_CERT_SECRET }}
      MSYSTEM: MINGW64

    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v4

      - name: Setup Msys2
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          release: false

      - name: Update MSYS2_DIR environment variable
        run: |
          echo "MSYS2_DIR=${{ steps.msys2.outputs.msys2-location }}" >> $env:GITHUB_ENV

      # emacs-30.2 is not compatible with GCC 15 (sys_strerror link failure).
      # Pin to GCC 14.2.0 and prevent --ensure from upgrading it back.
      - name: Pin GCC to 14.2.0
        shell: msys2 {0}
        run: |
          # Try revision -2 first, fall back to -1
          pacman -U --noconfirm \
            "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-gcc-libs-14.2.0-2-any.pkg.tar.zst" \
            "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-gcc-14.2.0-2-any.pkg.tar.zst" \
          || pacman -U --noconfirm \
            "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-gcc-libs-14.2.0-1-any.pkg.tar.zst" \
            "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-gcc-14.2.0-1-any.pkg.tar.zst"
          echo "[options]" >> /etc/pacman.conf
          echo "IgnorePkg = mingw-w64-x86_64-gcc mingw-w64-x86_64-gcc-libs" >> /etc/pacman.conf
          gcc --version

      - name: Clone Emacs
        run: .\emacs-build.cmd --clone --repo $env:EMACS_REPO --branch $env:EMACS_BRANCH

      - name: Install deps
        run: |
          .\emacs-build.cmd --slim --ensure --without-mps

      - name: Build Emacs
        run: |
          .\emacs-build.cmd --slim --branch $env:EMACS_BRANCH --configure --build-dev --without-mps

      - name: Package Emacs
        run: |
          $env:MSIXHeroCLI = &where.exe MSIXHeroCLI
          if ($env:MSIXHeroCLI) {
            .\emacs-build.cmd --slim --branch $env:EMACS_BRANCH --msix --pack-all --without-mps
          } else {
            .\emacs-build.cmd --slim --branch $env:EMACS_BRANCH --pack-all --without-mps
          }

      - name: Upload binaries to release
        id: upload_release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ github.token }}
          file: ./zips/*{_full.zip,.msix}
          file_glob: true
          tag: v${{ needs.prepare_env.outputs.version }}
          release_name: emacs_${{ needs.prepare_env.outputs.version }}
          draft: false
          prerelease: false
